<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <!-- 页面基础样式定义 -->
    <style>
        /* 全局重置样式，统一盒模型 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面主体样式：全屏渐变背景，内容居中 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 内容容器 */
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
        }

        /* 页面头部区域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 页面主标题 */
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* 页面副标题 */
        .header p {
            color: #888;
            font-size: 14px;
        }

        /* 表单分组 */
        .form-group {
            margin-bottom: 18px;
        }

        /* 表单标签 */
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
            font-weight: 500;
        }

        /* 表单输入框 */
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        /* 输入框聚焦效果 */
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        /* 提交按钮悬停效果 */
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 提交按钮禁用状态 */
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 返回链接 */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }

        /* 返回链接悬停效果 */
        .back-link:hover {
            text-decoration: underline;
        }

        /* Toast提示框 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
    </style>
</head>
<body>
    <!-- 修改密码表单容器 -->
    <div class="container">
        <!-- 页面头部标题 -->
        <div class="header">
            <h1>修改密码</h1>
            <p id="subTitle">请填写以下信息修改密码</p>
        </div>
        <!-- 原密码输入 -->
        <div class="form-group">
            <label for="oldPassword">原密码</label>
            <input type="password" id="oldPassword" placeholder="请输入原密码">
        </div>
        <!-- 新密码输入 -->
        <div class="form-group">
            <label for="newPassword">新密码</label>
            <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
        </div>
        <!-- 确认新密码输入 -->
        <div class="form-group">
            <label for="confirmPassword">确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
        </div>
        <!-- 确认修改按钮 -->
        <button class="submit-btn" id="submitBtn">确认修改</button>
        <!-- 返回首页链接 -->
        <a class="back-link" id="backBtn">返回首页</a>
    </div>

    <!-- Toast提示框容器 -->
    <div class="toast" id="toast"></div>

    <script>
        // API基础地址配置
        const API_BASE_URL = '/api';
        // 从本地存储读取登录信息
        const token = localStorage.getItem('token') || '';
        const role = localStorage.getItem('role') || 'ADMIN';
        const username = localStorage.getItem('username') || '';
        const loginType = localStorage.getItem('loginType') || 'user';

        // 未登录则跳转到登录页
        if (!token) {
            window.location.href = 'index.html';
        }

        // 从URL参数获取页面类型，默认为登录类型
        const params = new URLSearchParams(window.location.search);
        const pageType = params.get('type') || loginType;

        // 根据类型显示当前身份信息
        const typeLabels = { user: '管理员', student: '学生', teacher: '教师' };
        document.getElementById('subTitle').textContent = `当前身份：${typeLabels[pageType] || '用户'} — ${username}`;

        // 显示Toast提示消息
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 返回按钮点击事件
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'success.html';
        });

        // 确认修改按钮点击事件
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 表单验证
            if (!oldPassword || !newPassword || !confirmPassword) {
                showToast('请填写所有字段', 'error');
                return;
            }
            if (newPassword.length < 6) {
                showToast('新密码长度不能少于6位', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '修改中...';

            try {
                // 发送修改密码请求
                const res = await fetch(`${API_BASE_URL}/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({
                        type: pageType,
                        id: username,
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    // 清空输入框
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showToast(data.message || '修改失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '确认修改';
            }
        });
    </script>
</body>
</html>
