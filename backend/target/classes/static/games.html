<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .game-icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }

        .game-info {
            flex: 1;
            min-width: 0;
        }

        .game-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .game-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-arrow {
            color: #ccc;
            font-size: 24px;
            font-weight: 300;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 80px 40px;
            text-align: center;
            color: #999;
            font-size: 15px;
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 游戏中心</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="backBtn">← 返回首页</button>
            </div>
        </div>

        <div class="game-grid" id="gameGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">
            <span class="emoji">🎮</span>
            暂无游戏
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const token = localStorage.getItem('token') || '';
        if (!token) {
            window.location.href = 'index.html';
        }

        const toast = document.getElementById('toast');
        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        const gameIconMap = {
            'tank-battle': '🔥',
            'pinball': '⚽'
        };

        const gamePageMap = {
            'tank-battle': 'tank-battle.html',
            'pinball': 'pinball.html'
        };

        async function loadGames() {
            try {
                const res = await fetch('/api/games/online', {
                    headers: { 'Authorization': token }
                });
                if (!res.ok) throw new Error('加载失败');
                const games = await res.json();
                const grid = document.getElementById('gameGrid');
                const empty = document.getElementById('emptyState');

                if (!Array.isArray(games) || games.length === 0) {
                    grid.style.display = 'none';
                    empty.style.display = 'block';
                    return;
                }

                grid.style.display = 'grid';
                empty.style.display = 'none';

                // 按 code 去重
                const uniqueGames = [];
                const seenCodes = new Set();
                for (const g of games) {
                    if (!seenCodes.has(g.code)) {
                        seenCodes.add(g.code);
                        uniqueGames.push(g);
                    }
                }

                grid.innerHTML = uniqueGames.map(game => {
                    const icon = gameIconMap[game.code] || (game.icon || '🎮');
                    const page = gamePageMap[game.code];
                    const clickAttr = page ? `onclick="goGame('${game.code}')"` : '';
                    const desc = game.description || '点击开始游戏';
                    return `
                        <div class="game-card" ${clickAttr}>
                            <div class="game-icon">${icon}</div>
                            <div class="game-info">
                                <div class="game-name">${escapeHtml(game.name)}</div>
                                <div class="game-desc">${escapeHtml(desc)}</div>
                            </div>
                            <div class="game-arrow">›</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('加载游戏列表失败', err);
                showToast('加载游戏列表失败', 'error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.goGame = function(code) {
            const page = gamePageMap[code];
            if (page) {
                window.location.href = page;
            } else {
                showToast('游戏开发中', 'error');
            }
        };

        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'success.html';
        });

        loadGames();
    </script>
</body>
</html>
