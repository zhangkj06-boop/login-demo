# 服务绑定地址（0.0.0.0 表示监听所有网卡，localhost 仅本地访问）
server.address=0.0.0.0
# 服务端口号（HTTPS）  8443   8080
server.port=8443     
# 应用基础URL（供前端和接口测试引用）
app.base-url=http://zhengzhou:8080
# 应用名称

spring.application.name=login-demo
# 字符编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# SSL / HTTPS 配置
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=login-demo

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/login_demo?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
